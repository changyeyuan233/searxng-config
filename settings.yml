use_default_settings: true

search:
  formats:
    - html
    - json

server:
  secret_key: "hermes-searxng-secret-key-change-me"
  bind_address: "0.0.0.0"
  port: 8080
  limiter: false
  public_instance: false

ui:
  static_use_hash: true
  default_theme: simple
  default_locale: en

engines:
  - name: google
    engine: google
    shortcut: g
    disabled: false

  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: false

  - name: bing
    engine: bing
    shortcut: bi
    disabled: false

  - name: brave
    engine: brave
    shortcut: br
    disabled: false

  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    disabled: false

  - name: github
    engine: github
    shortcut: gh
    disabled: false

  - name: arxiv
    engine: arxiv
    shortcut: ar
    disabled: false

  - name: reddit
    engine: reddit
    shortcut: re
    disabled: false

  - name: youtube
    engine: youtube
    shortcut: yt
    engine_type: online_media
    disabled: false

  - name: bilibili
    engine: bilibili
    shortcut: bl
    disabled: false

  - name: google images
    engine: google_images
    shortcut: gim
    disabled: false

  - name: bing images
    engine: bing_images
    shortcut: bim
    disabled: false

  - name: duckduckgo images
    engine: duckduckgo_images
    shortcut: dim
    disabled: false

  - name: deviantart
    engine: deviantart
    shortcut: da
    disabled: false

  - name: openverse
    engine: openverse
    shortcut: ov
    disabled: false

outgoing:
  request_timeout: 15.0
  max_request_timeout: 30.0
  useragent_suffix: ""
  enable_http2: true
